{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SISMGC | Acesso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Fraunces:wght@600;700&display=swap">
    <style>
        :root {
            --bg: #0c1220;
            --bg-2: #101a2f;
            --surface: #121b2f;
            --surface-2: #0f182b;
            --text: #e6edf9;
            --muted: #9fb0d1;
            --accent: #d6a354;
            --accent-2: #4c8dff;
            --border: #1e2a45;
            --shadow: 0 18px 45px rgba(0,0,0,.35);
        }
        body[data-bs-theme="light"] {
            --bg: #f2f4f8;
            --bg-2: #ffffff;
            --surface: #ffffff;
            --surface-2: #f7f9fc;
            --text: #0b1020;
            --muted: #55627a;
            --accent: #b87822;
            --accent-2: #1f4bb3;
            --border: #e3e7ef;
            --shadow: 0 14px 32px rgba(17,24,39,.12);
        }
        html, body { height: 100%; }
        body {
            font-family: "Manrope", system-ui, -apple-system, Segoe UI, sans-serif;
            background: radial-gradient(1200px 600px at 10% 10%, #1b2a4a 0%, transparent 60%), var(--bg);
            color: var(--text);
        }
        .auth-shell { min-height: 100vh; display: flex; }
        .auth-visual {
            background: linear-gradient(160deg, #142244 0%, #0c1220 55%, #0b1020 100%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
        }
        body[data-bs-theme="light"] .auth-visual {
            background: linear-gradient(160deg, #f9fafc 0%, #eef2f7 55%, #e9eef6 100%);
            color: var(--text);
        }
        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            border-radius: 18px;
        }
        .brand-title {
            font-family: "Fraunces", serif;
            letter-spacing: .5px;
        }
        .muted { color: var(--muted); }
        .form-control, .form-select, input[type="text"], input[type="password"] {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: .75rem .9rem;
            border-radius: 12px;
            width: 100%;
        }
        .form-control:focus, input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--accent-2);
            box-shadow: 0 0 0 .2rem rgba(76,141,255,.2);
        }
        .btn-accent {
            background: linear-gradient(135deg, var(--accent) 0%, #f0c06b 100%);
            border: none;
            color: #1b1406;
            font-weight: 700;
            letter-spacing: .3px;
            padding: .75rem 1rem;
            border-radius: 12px;
        }
        .btn-accent:hover { filter: brightness(0.95); }
        .icon-pill {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(214,163,84,.15);
            color: var(--accent);
        }
        .auth-illustration {
            max-width: 420px;
            width: 100%;
        }
    </style>
</head>
<body data-bs-theme="dark">
    <div class="container-fluid auth-shell">
        {% block content %}{% endblock %}
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (function() {
    const stored = localStorage.getItem("sismgc-theme");
    const mode = stored || "dark";
    document.body.setAttribute("data-bs-theme", mode);
  })();
</script>
</body>
</html>
