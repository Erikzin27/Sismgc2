<div class="section-heading{% if extra_class %} {{ extra_class }}{% endif %}">
    <div>
        <h6 class="section-heading__title">{{ title }}</h6>
        {% if subtitle %}
            <p class="section-heading__subtitle">{{ subtitle }}</p>
        {% endif %}
    </div>
    {% if right %}
        <div>{{ right|safe }}</div>
    {% endif %}
</div>
